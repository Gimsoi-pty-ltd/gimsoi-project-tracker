---
name: Auth API Tests

"on":
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci --omit=optional

      - name: Install Playwright browsers
        working-directory: apps/backend
        run: npx playwright install --with-deps chromium

      - name: Push Prisma Schema
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Run Playwright API Tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
          GMAIL_USER: ci-test@example.com
          GMAIL_APP_PASSWORD: ci-dummy-password
          GEMINI_API_KEY: dummy
          CLIENT_URL: http://localhost:5173
          PORT: 5001
          NODE_ENV: test
        run: npm run test:api

      - name: Health Endpoint Smoke Test
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
          GMAIL_USER: ci-test@example.com
          GMAIL_APP_PASSWORD: ci-dummy-password
          GEMINI_API_KEY: dummy
          CLIENT_URL: http://localhost:5173
          PORT: 5002
          NODE_ENV: test
        run: |
          node server.js &
          SERVER_PID=$!
          echo "Started server PID $SERVER_PID on port 5002"
          for i in $(seq 1 10); do
            sleep 1
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 3 http://localhost:5002/api/health || echo "000")
            if [ "$HTTP_STATUS" != "000" ]; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "Waiting for server... attempt $i"
          done
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 5 http://localhost:5002/api/health)
          echo "Health response body:"
          curl --silent --max-time 5 http://localhost:5002/api/health
          kill $SERVER_PID 2>/dev/null || true
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "PASS: health endpoint returned $HTTP_STATUS"
          else
            echo "FAIL: health endpoint returned $HTTP_STATUS"
            exit 1
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/backend/playwright-report/
          retention-days: 14
