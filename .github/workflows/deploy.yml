---
name: Deploy to Catalyst

on:
  workflow_dispatch:
  push:
    branches:
      - staging-deploy
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest

    env:
      CATALYST_DC: in

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Select staging project
        if: github.ref == 'refs/heads/staging-deploy'
        run: |
          catalyst project:use ${{ secrets.CATALYST_PROJECT_ID_STAGING }} \
            --token ${{ secrets.CATALYST_TOKEN }} \
            --dc $CATALYST_DC

      - name: Select production project
        if: github.ref == 'refs/heads/main'
        run: |
          catalyst project:use ${{ secrets.CATALYST_PROJECT_ID_PROD }} \
            --token ${{ secrets.CATALYST_TOKEN }} \
            --dc $CATALYST_DC

      - name: Deploy to Catalyst
        run: |
          catalyst deploy \
            --token ${{ secrets.CATALYST_TOKEN }} \
            --dc $CATALYST_DC

      - name: Verify staging frontend
        if: github.ref == 'refs/heads/staging-deploy'
        env:
          VERIFY_URL: ${{ secrets.CATALYST_STAGING_FRONTEND_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$VERIFY_URL")

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::error::Staging frontend is not reachable"
            exit 1
          fi

          echo "Staging frontend is reachable."

      - name: Verify staging backend
        if: github.ref == 'refs/heads/staging-deploy'
        env:
          VERIFY_URL: ${{ secrets.CATALYST_STAGING_BACKEND_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$VERIFY_URL/api/health")

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::error::Staging backend is not reachable"
            exit 1
          fi

          echo "Staging backend is reachable."
