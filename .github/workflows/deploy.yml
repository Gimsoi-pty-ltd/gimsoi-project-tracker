name: Deployment Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare-deploy:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: deployment/backend
        continue-on-error: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-package
          path: deployment/frontend
        continue-on-error: true

      - name: Confirm deployment workflow config
        run: |
          echo "Deployment workflow prepared."
          echo "Zoho Catalyst deployment step will be added once platform setup is confirmed."
          echo "Environment variables and secrets will be configured through GitHub Secrets."